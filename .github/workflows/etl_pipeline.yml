name: Extraction Pollution (ETL)

# Quand ce script doit-il s'exécuter ?
on:
  schedule:
    - cron: '0 * * * *' # Toutes les heures (à la minute 0)
  workflow_dispatch: # Permet aussi de lancer le script manuellement avec un bouton

jobs:
  run-etl:
    runs-on: ubuntu-latest # On utilise un serveur Linux gratuit

    steps:
      # 1. Récupérer le code de votre dépôt
      - name: Checkout du code
        uses: actions/checkout@v4

      # 2. Installer Python
      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Installer les dépendances (Pandas, etc.)
      - name: Installation des dépendances
        run: pip install -r requirements.txt

      # 4. Lancer le script avec les secrets
      - name: Exécution du script ETL
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          SUPABASE_URI: ${{ secrets.SUPABASE_URI }}
        run: python src/data_engineering/fetch_weather.py
